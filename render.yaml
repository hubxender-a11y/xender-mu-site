services:
  - type: web
    name: xender-mu-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: ADMIN_TOKEN
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: xender-mu-db
          property: connectionString

databases:
  - name: xender-mu-db
    plan: free
